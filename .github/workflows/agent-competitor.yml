name: Competitor watch

# Watches the competition (mainly Spectre) and UK proptech for new features and
# posts a briefing as a GitHub Issue. Free: GitHub Actions + Groq + web search.
on:
  # No standalone schedule — the Managing Director dispatches this weekly.
  workflow_dispatch:
    inputs:
      topic:
        description: 'What to watch (leave blank for the default Spectre/UK-proptech watch)'
        required: false
        default: ''
      issue:
        description: 'Internal: issue number to reply on (the Manager sets this; leave blank for a standalone report)'
        required: false
        default: ''

permissions:
  issues: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run competitor agent
        id: agent
        env:
          AGENT_ROLE: competitor
          AGENT_TOPIC: ${{ github.event.inputs.topic }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: node scripts/agent.js
      - name: Post the briefing (reply in the thread, or open a new issue)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE: ${{ github.event.inputs.issue }}
          TITLE: ${{ steps.agent.outputs.report_title }}
          FILE: ${{ steps.agent.outputs.report_file }}
        run: |
          if [ -n "$ISSUE" ]; then
            gh issue comment "$ISSUE" --body-file "$FILE"
          else
            gh issue create --title "$TITLE" --body-file "$FILE"
          fi
