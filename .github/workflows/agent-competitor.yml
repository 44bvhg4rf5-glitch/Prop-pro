name: Competitor watch

# Watches the competition (mainly Spectre) and UK proptech for new features and
# posts a briefing as a GitHub Issue. Free: GitHub Actions + Groq + web search.
on:
  schedule:
    - cron: '0 8 * * 1'        # every Monday 08:00 UTC (staggered after Research to avoid AI rate limits)
  workflow_dispatch:
    inputs:
      topic:
        description: 'What to watch (leave blank for the default Spectre/UK-proptech watch)'
        required: false
        default: ''

permissions:
  issues: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run competitor agent
        id: agent
        env:
          AGENT_ROLE: competitor
          AGENT_TOPIC: ${{ github.event.inputs.topic }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: node scripts/agent.js
      - name: Post briefing as an issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh issue create --title "${{ steps.agent.outputs.report_title }}" --body-file "${{ steps.agent.outputs.report_file }}"
