name: Health check

# Pings the live site + key APIs daily and opens an issue ONLY when something is
# down — or when OS Places finally goes live (HTTP 200). No AI keys needed: this
# is pure HTTP checking, so it's free and silent on healthy days.
on:
  schedule:
    - cron: '0 8 * * *'        # every day 08:00 UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run health check
        id: agent
        env:
          AGENT_ROLE: health
          SITE_URL: ${{ vars.SITE_URL }}
        run: node scripts/agent.js
      - name: Open an issue (only if something needs attention)
        if: steps.agent.outputs.has_problem == 'true' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh issue create --title "${{ steps.agent.outputs.report_title }}" --body-file "${{ steps.agent.outputs.report_file }}"
