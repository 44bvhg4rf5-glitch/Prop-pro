name: Manager

# The Manager sits above the whole team. You give it a task; it writes a plan,
# decides which specialist agents should handle it, opens ONE plan issue, and
# then LAUNCHES those agents for you — each replies in that same issue thread,
# so everything stays in one conversation.
# Free: GitHub Actions + Groq. No tokens to set up — GITHUB_TOKEN is allowed to
# trigger the other workflows' workflow_dispatch events.
# (Prefer chatting by issue? Open an issue titled "Manager: ..." instead.)
on:
  workflow_dispatch:
    inputs:
      task:
        description: 'What do you want done? Describe it plainly — the Manager will plan it and assign the right agents.'
        required: true
        default: ''

permissions:
  issues: write
  actions: write

jobs:
  manage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run the Manager
        id: agent
        env:
          AGENT_ROLE: manager
          AGENT_TASK: ${{ github.event.inputs.task }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/agent.js
      - name: Post the plan as an issue
        id: plan
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TITLE: ${{ steps.agent.outputs.report_title }}
          FILE: ${{ steps.agent.outputs.report_file }}
        run: |
          url=$(gh issue create --title "$TITLE" --body-file "$FILE")
          echo "Created $url"
          # The agents will reply on this plan issue, keeping it all in one thread.
          echo "number=$(printf '%s' "$url" | sed -E 's#.*/##')" >> "$GITHUB_OUTPUT"
      - name: Launch the assigned agents
        if: steps.agent.outputs.dispatch_json != '' && steps.agent.outputs.dispatch_json != '[]'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISPATCH: ${{ steps.agent.outputs.dispatch_json }}
          ISSUE: ${{ steps.plan.outputs.number }}
        run: |
          first=1
          echo "$DISPATCH" | jq -c '.[]' | while read -r item; do
            agent=$(echo "$item" | jq -r '.agent')
            topic=$(echo "$item" | jq -r '.topic // ""')
            file="agent-${agent}.yml"
            # Stagger launches so the agents don't all hit the AI provider at once (avoids 429s).
            if [ "$first" = "1" ]; then first=0; else sleep 40; fi
            echo "Launching $agent ($file) on issue #$ISSUE ..."
            case "$agent" in
              research|competitor|content|rnd)
                gh workflow run "$file" --ref main -f topic="$topic" -f issue="$ISSUE" || echo "::warning::could not launch $agent" ;;
              health|security)
                gh workflow run "$file" --ref main -f issue="$ISSUE" || echo "::warning::could not launch $agent" ;;
              *)
                echo "::warning::unknown agent $agent — skipped" ;;
            esac
          done
