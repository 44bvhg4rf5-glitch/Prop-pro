name: Research agent

# Researches a topic for you and posts a briefing as a GitHub Issue.
# Press "Run workflow" and type a topic, or let it run weekly on its default brief.
# Free: uses GitHub Actions + Groq (+ Tavily web search if the key is set).
on:
  schedule:
    - cron: '0 7 * * 1'        # every Monday 07:00 UTC
  workflow_dispatch:
    inputs:
      topic:
        description: 'What should the research agent look into? (leave blank for the default brief)'
        required: false
        default: ''

permissions:
  issues: write

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run research agent
        id: agent
        env:
          AGENT_ROLE: research
          AGENT_TOPIC: ${{ github.event.inputs.topic }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: node scripts/agent.js
      - name: Post briefing as an issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh issue create --title "${{ steps.agent.outputs.report_title }}" --body-file "${{ steps.agent.outputs.report_file }}"
