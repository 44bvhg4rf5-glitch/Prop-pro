name: R&D

# Head of R&D — reviews the tools currently powering the site and proposes
# concrete, costed improvements, then posts the brief as a GitHub Issue.
# Free: GitHub Actions + Groq (+ Tavily web search if the key is set).
on:
  # No standalone schedule — the Managing Director dispatches this weekly.
  workflow_dispatch:
    inputs:
      topic:
        description: 'What should R&D focus on? (leave blank for the default: raising the address win-rate from free data)'
        required: false
        default: ''
      issue:
        description: 'Internal: issue number to reply on (the Manager sets this; leave blank for a standalone report)'
        required: false
        default: ''

permissions:
  issues: write

jobs:
  rnd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run R&D agent
        id: agent
        env:
          AGENT_ROLE: rnd
          AGENT_TOPIC: ${{ github.event.inputs.topic }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: node scripts/agent.js
      - name: Post the R&D brief (reply in the thread, or open a new issue)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE: ${{ github.event.inputs.issue }}
          TITLE: ${{ steps.agent.outputs.report_title }}
          FILE: ${{ steps.agent.outputs.report_file }}
        run: |
          if [ -n "$ISSUE" ]; then
            gh issue comment "$ISSUE" --body-file "$FILE"
          else
            gh issue create --title "$TITLE" --body-file "$FILE"
          fi
