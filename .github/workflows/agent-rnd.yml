name: R&D

# Head of R&D — reviews the tools currently powering the site and proposes
# concrete, costed improvements, then posts the brief as a GitHub Issue.
# Free: GitHub Actions + Groq (+ Tavily web search if the key is set).
on:
  schedule:
    - cron: '0 7 * * 5'        # every Friday 07:00 UTC
  workflow_dispatch:
    inputs:
      topic:
        description: 'What should R&D focus on? (leave blank for the default: raising the address win-rate from free data)'
        required: false
        default: ''

permissions:
  issues: write

jobs:
  rnd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run R&D agent
        id: agent
        env:
          AGENT_ROLE: rnd
          AGENT_TOPIC: ${{ github.event.inputs.topic }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: node scripts/agent.js
      - name: Post the R&D brief as an issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh issue create --title "${{ steps.agent.outputs.report_title }}" --body-file "${{ steps.agent.outputs.report_file }}"
