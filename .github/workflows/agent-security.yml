name: Security agent

# Runs a security review of the backend on a schedule (and on demand), then
# posts the findings to you as a GitHub Issue. Free: uses GitHub Actions + Groq.
on:
  schedule:
    - cron: '0 7 * * 1'        # every Monday 07:00 UTC
  workflow_dispatch: {}          # adds a "Run workflow" button you can press anytime

permissions:
  issues: write                  # so it can open the report issue

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run security agent
        id: agent
        env:
          AGENT_ROLE: security
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/agent.js
      - name: Post findings as an issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh issue create --title "${{ steps.agent.outputs.report_title }}" --body-file "${{ steps.agent.outputs.report_file }}"
