name: Security agent

# Runs a security review of the backend on a schedule (and on demand), then
# posts the findings to you as a GitHub Issue. Free: uses GitHub Actions + Groq.
on:
  # No standalone schedule — the Managing Director dispatches this weekly.
  workflow_dispatch:
    inputs:
      issue:
        description: 'Internal: issue number to reply on (the Manager sets this; leave blank for a standalone report)'
        required: false
        default: ''

permissions:
  issues: write                  # so it can open the report issue

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run security agent
        id: agent
        env:
          AGENT_ROLE: security
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/agent.js
      - name: Post the findings (reply in the thread, or open a new issue)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE: ${{ github.event.inputs.issue }}
          TITLE: ${{ steps.agent.outputs.report_title }}
          FILE: ${{ steps.agent.outputs.report_file }}
        run: |
          if [ -n "$ISSUE" ]; then
            gh issue comment "$ISSUE" --body-file "$FILE"
          else
            gh issue create --title "$TITLE" --body-file "$FILE"
          fi
