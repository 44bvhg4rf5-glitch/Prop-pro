<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ViralForge — Autonomous TikTok Content Agency</title>
<style>
  :root {
    --bg: #0a0a0f; --panel: #15151f; --panel2: #1d1d2b; --line: #2a2a3c;
    --text: #f2f2f7; --muted: #9a9ab0; --accent: #fe2c55; --accent2: #25f4ee;
    --good: #2ecc71; --warn: #f1c40f;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: radial-gradient(1200px 600px at 50% -10%, #1a1030 0%, var(--bg) 60%); color: var(--text);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; min-height: 100vh; }
  .wrap { max-width: 1040px; margin: 0 auto; padding: 32px 20px 80px; }
  header { text-align: center; margin-bottom: 28px; }
  .logo { font-size: 30px; font-weight: 800; letter-spacing: -0.5px;
    background: linear-gradient(90deg, var(--accent2), var(--accent)); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .tag { color: var(--muted); margin-top: 4px; font-size: 14px; }
  .brief { background: var(--panel); border: 1px solid var(--line); border-radius: 16px; padding: 20px; margin-bottom: 24px; }
  .brief h2 { margin: 0 0 14px; font-size: 16px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .field { flex: 1 1 200px; display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  input, select { background: var(--panel2); border: 1px solid var(--line); color: var(--text);
    border-radius: 10px; padding: 11px 13px; font-size: 14px; outline: none; }
  input:focus, select:focus { border-color: var(--accent2); }
  .actions { display: flex; gap: 10px; align-items: center; margin-top: 16px; flex-wrap: wrap; }
  button.run { background: linear-gradient(90deg, var(--accent), #ff5a78); color: #fff; border: none; font-weight: 700;
    padding: 12px 22px; border-radius: 10px; cursor: pointer; font-size: 15px; }
  button.run:disabled { opacity: 0.5; cursor: not-allowed; }
  button.ghost { background: transparent; color: var(--muted); border: 1px solid var(--line); padding: 12px 16px;
    border-radius: 10px; cursor: pointer; font-size: 14px; }
  .status { color: var(--muted); font-size: 13px; }
  .status b { color: var(--accent2); }
  .pipe { display: grid; gap: 14px; }
  .agent { background: var(--panel); border: 1px solid var(--line); border-radius: 16px; overflow: hidden; opacity: 0.55; transition: opacity .3s, border-color .3s; }
  .agent.active { opacity: 1; border-color: var(--accent2); box-shadow: 0 0 0 1px var(--accent2)33; }
  .agent.done { opacity: 1; }
  .agent.failed { opacity: 1; border-color: var(--accent); }
  .ahead { display: flex; align-items: center; gap: 12px; padding: 16px 18px; cursor: pointer; }
  .emoji { font-size: 24px; width: 30px; text-align: center; }
  .ameta { flex: 1; }
  .aname { font-weight: 700; font-size: 15px; }
  .arole { color: var(--muted); font-size: 12.5px; }
  .pill { font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 600; white-space: nowrap; }
  .pill.idle { background: #ffffff10; color: var(--muted); }
  .pill.run { background: var(--accent2)22; color: var(--accent2); }
  .pill.done { background: var(--good)22; color: var(--good); }
  .pill.fail { background: var(--accent)22; color: var(--accent); }
  .abody { padding: 0 18px 18px; display: none; }
  .agent.open .abody { display: block; }
  .card { background: var(--panel2); border: 1px solid var(--line); border-radius: 12px; padding: 14px; margin-top: 10px; }
  .card h4 { margin: 0 0 6px; font-size: 14px; color: var(--accent2); }
  .card .sub { color: var(--muted); font-size: 12px; margin-bottom: 8px; }
  .kv { font-size: 13.5px; margin: 3px 0; }
  .kv b { color: var(--text); }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .chip { background: #ffffff0d; border: 1px solid var(--line); border-radius: 20px; padding: 3px 10px; font-size: 12px; color: var(--muted); }
  .shot { border-left: 2px solid var(--accent); padding-left: 10px; margin: 6px 0; font-size: 13px; }
  .shot .v { color: var(--accent2); }
  pre.raw { white-space: pre-wrap; word-break: break-word; font-size: 12px; color: var(--muted); background: #00000040; padding: 10px; border-radius: 8px; margin-top: 8px; }
  .spin { width: 14px; height: 14px; border: 2px solid #ffffff33; border-top-color: var(--accent2); border-radius: 50%; display: inline-block; animation: sp 0.7s linear infinite; }
  @keyframes sp { to { transform: rotate(360deg); } }
  .score { display: inline-block; min-width: 26px; text-align: center; padding: 2px 8px; border-radius: 8px; font-weight: 700; }
  .footer { text-align: center; color: var(--muted); font-size: 12px; margin-top: 30px; }
  .banner { background: #ff2c5515; border: 1px solid var(--accent); color: #ffb3c1; padding: 12px 14px; border-radius: 10px; margin-bottom: 18px; font-size: 13.5px; display: none; }
  .toolbar { display: flex; gap: 8px; justify-content: flex-end; margin-bottom: 10px; }
  .toolbar button { background: var(--panel2); border: 1px solid var(--line); color: var(--muted); border-radius: 8px; padding: 7px 12px; cursor: pointer; font-size: 12.5px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">⚡ ViralForge</div>
    <div class="tag">An autonomous team of AI agents that builds a week of TikTok content while you sleep.</div>
  </header>

  <div class="banner" id="banner"></div>

  <div class="brief">
    <h2>Brief your agency</h2>
    <div class="row">
      <div class="field" style="flex: 2 1 280px;">
        <label>Niche</label>
        <input id="niche" placeholder="e.g. problem-solving kitchen gadgets" value="problem-solving kitchen gadgets">
      </div>
      <div class="field">
        <label>Product (optional)</label>
        <input id="product" placeholder="leave blank to let the Scout pick">
      </div>
    </div>
    <div class="row" style="margin-top: 12px;">
      <div class="field">
        <label>Goal</label>
        <select id="goal">
          <option>Drive TikTok Shop sales with zero ad spend</option>
          <option>Grow followers fast for a faceless account</option>
          <option>Launch a new dropshipping product</option>
          <option>Build an email list / community</option>
        </select>
      </div>
    </div>
    <div class="actions">
      <button class="run" id="runBtn">▶ Run the agency</button>
      <button class="ghost" id="copyBtn" style="display:none;">⧉ Copy full plan</button>
      <span class="status" id="status"></span>
    </div>
  </div>

  <div class="pipe" id="pipe"></div>

  <div class="footer">ViralForge runs on your existing free AI key — no extra cost. Film the batch once, post daily, double down on what pops.</div>
</div>

<script>
const PIPE = document.getElementById('pipe');
const banner = document.getElementById('banner');
let AGENTS = [];
let lastResults = {};

function el(tag, cls, html) { const e = document.createElement(tag); if (cls) e.className = cls; if (html != null) e.innerHTML = html; return e; }
function esc(s) { return String(s == null ? '' : s).replace(/[&<>]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[c])); }

async function loadAgents() {
  try {
    const r = await fetch('/api/agency');
    const j = await r.json();
    AGENTS = j.agents || [];
    if (!j.configured) {
      banner.style.display = 'block';
      banner.textContent = 'No AI key configured yet. Add a free GEMINI_API_KEY or GROQ_API_KEY in project settings, then reload — the agents will spring to life.';
    }
    renderSkeleton();
  } catch (e) { banner.style.display = 'block'; banner.textContent = 'Could not reach the agency API.'; }
}

function renderSkeleton() {
  PIPE.innerHTML = '';
  AGENTS.forEach((a, i) => {
    const card = el('div', 'agent');
    card.id = 'agent-' + a.id;
    card.innerHTML = `
      <div class="ahead">
        <div class="emoji">${a.emoji}</div>
        <div class="ameta"><div class="aname">${i + 1}. ${esc(a.name)}</div><div class="arole">${esc(a.role)}</div></div>
        <div class="pill idle" id="pill-${a.id}">idle</div>
      </div>
      <div class="abody" id="body-${a.id}"></div>`;
    card.querySelector('.ahead').onclick = () => card.classList.toggle('open');
    PIPE.appendChild(card);
  });
}

function setPill(id, state, text) {
  const p = document.getElementById('pill-' + id);
  const card = document.getElementById('agent-' + id);
  p.className = 'pill ' + state;
  p.innerHTML = state === 'run' ? '<span class="spin"></span> working' : (text || state);
  card.classList.remove('active', 'done', 'failed');
  if (state === 'run') card.classList.add('active');
  if (state === 'done') card.classList.add('done', 'open');
  if (state === 'fail') card.classList.add('failed', 'open');
}

async function run() {
  const seed = {
    niche: document.getElementById('niche').value.trim(),
    product: document.getElementById('product').value.trim(),
    goal: document.getElementById('goal').value,
  };
  if (!seed.niche) { alert('Give your agency a niche to work with.'); return; }
  const btn = document.getElementById('runBtn');
  const status = document.getElementById('status');
  btn.disabled = true;
  document.getElementById('copyBtn').style.display = 'none';
  renderSkeleton();
  lastResults = {};
  const out = {};

  for (let i = 0; i < AGENTS.length; i++) {
    const a = AGENTS[i];
    setPill(a.id, 'run');
    status.innerHTML = `Agent <b>${esc(a.name)}</b> is working… (${i + 1}/${AGENTS.length})`;
    try {
      const r = await fetch('/api/agency', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ step: a.id, seed, out }),
      });
      const j = await r.json();
      if (!j.ok) { setPill(a.id, 'fail', 'failed'); document.getElementById('body-' + a.id).innerHTML = `<div class="card">⚠️ ${esc((j.error && j.error.message) || j.error || 'failed')}</div>`; continue; }
      out[a.id] = j.data || { _text: j.text };
      lastResults[a.id] = j;
      renderResult(a, j);
      setPill(a.id, 'done', j.searched ? 'done · searched' : 'done');
    } catch (e) {
      setPill(a.id, 'fail', 'failed');
    }
  }
  status.innerHTML = '✅ Your content drop is ready. Film the batch, then post on the calendar.';
  btn.disabled = false;
  document.getElementById('copyBtn').style.display = 'inline-block';
}

function renderResult(a, j) {
  const body = document.getElementById('body-' + a.id);
  const d = j.data;
  if (!d) { body.innerHTML = `<pre class="raw">${esc(j.text || '')}</pre>`; return; }
  let html = '';
  const render = {
    scout: () => {
      (d.products || []).forEach(p => html += `<div class="card"><h4>${esc(p.name)}</h4><div class="sub">${esc(p.price_gbp)} · ${esc(p.wow_factor)}</div><div class="kv">🎬 ${esc(p.demo_idea)}</div></div>`);
      if (d.trends) { html += `<div class="card"><h4>Live trends</h4>`; d.trends.forEach(t => html += `<div class="kv"><b>${esc(t.name)}</b> — ${esc(t.why)}</div>`); html += `</div>`; }
      if (d.angles) html += `<div class="card"><h4>Angles</h4><div class="chips">${d.angles.map(x => `<span class="chip">${esc(x)}</span>`).join('')}</div></div>`;
    },
    strategist: () => {
      html += `<div class="card"><h4>${esc(d.brand_angle || 'Positioning')}</h4><div class="kv"><b>Hero:</b> ${esc(d.hero_product)}</div><div class="kv"><b>Viewer:</b> ${esc(d.target_viewer)}</div><div class="kv"><b>Big idea:</b> ${esc(d.big_idea)}</div></div>`;
      (d.content_pillars || []).forEach(p => html += `<div class="card"><h4>${esc(p.name)}</h4><div class="sub">${esc(p.purpose)}</div></div>`);
    },
    scriptwriter: () => {
      (d.scripts || []).forEach(s => {
        html += `<div class="card"><h4>${esc(s.title)} <span class="chip">${esc(s.pillar)}</span> <span class="chip">${esc(s.duration_seconds)}s</span></h4><div class="kv"><b>Hook:</b> ${esc(s.hook_line)}</div>`;
        (s.shots || []).forEach(sh => html += `<div class="shot"><span class="v">${esc(sh.visual)}</span> — ${esc(sh.voiceover_or_text)}</div>`);
        html += `<div class="kv"><b>CTA:</b> ${esc(s.cta)}</div></div>`;
      });
    },
    hooks: () => {
      (d.hooks || []).forEach(h => html += `<div class="card"><h4>${esc(h.for_script)}</h4>${(h.options || []).map(o => `<div class="kv">🪝 ${esc(o)}</div>`).join('')}</div>`);
      if (d.universal_hooks) html += `<div class="card"><h4>Universal hooks</h4>${d.universal_hooks.map(o => `<div class="kv">🪝 ${esc(o)}</div>`).join('')}</div>`;
    },
    captions: () => {
      (d.posts || []).forEach(p => html += `<div class="card"><h4>${esc(p.for_script)}</h4><div class="kv">${esc(p.caption)}</div><div class="chips">${(p.hashtags || []).map(t => `<span class="chip">#${esc(String(t).replace(/^#/, ''))}</span>`).join('')}</div><div class="kv sub">📌 ${esc(p.comment_pin)}</div></div>`);
    },
    scheduler: () => {
      html += `<div class="card"><h4>Batch plan</h4><div class="kv"><b>Film day:</b> ${esc(d.film_day)}</div><div class="kv">${esc(d.batch_plan)}</div></div>`;
      (d.calendar || []).forEach(c => html += `<div class="card"><h4>${esc(c.day)} · ${esc(c.time)}</h4><div class="kv">${esc(c.script_title)}</div><div class="sub">${esc(c.why_this_slot)}</div></div>`);
    },
    optimizer: () => {
      (d.scores || []).forEach(s => { const col = s.viral_score >= 7 ? 'var(--good)' : s.viral_score >= 5 ? 'var(--warn)' : 'var(--accent)';
        html += `<div class="card"><h4><span class="score" style="background:${col}22;color:${col}">${esc(s.viral_score)}</span> ${esc(s.script_title)}</h4><div class="sub">${esc(s.reason)}</div></div>`; });
      if (d.weekly_focus) html += `<div class="card"><h4>🎯 This week, focus on</h4><div class="kv">${esc(d.weekly_focus)}</div></div>`;
      if (d.if_it_pops) html += `<div class="card"><h4>If a video pops</h4>${d.if_it_pops.map(x => `<div class="kv">→ ${esc(x)}</div>`).join('')}</div>`;
    },
  };
  (render[a.id] || (() => { html = `<pre class="raw">${esc(JSON.stringify(d, null, 2))}</pre>`; }))();
  body.innerHTML = html || `<pre class="raw">${esc(JSON.stringify(d, null, 2))}</pre>`;
}

document.getElementById('runBtn').onclick = run;
document.getElementById('copyBtn').onclick = () => {
  navigator.clipboard.writeText(JSON.stringify(lastResults, null, 2));
  document.getElementById('copyBtn').textContent = '✓ Copied';
  setTimeout(() => document.getElementById('copyBtn').textContent = '⧉ Copy full plan', 1500);
};
loadAgents();
</script>
</body>
</html>
