services:
  - type: web
    name: propmail-pro
    runtime: node
    plan: free
    branch: claude/application-website-6b87jv
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      # Optional — only needed for the AI features (chat, owner research, AI
      # letter writing). The live Rightmove search works WITHOUT this.
      - key: ANTHROPIC_API_KEY
        sync: false
      # Optional — free GOV.UK EPC register token, powers the "Find full
      # address" (house-number) lookup. Register at
      # https://get-energy-performance-data.communities.gov.uk
      - key: EPC_API_KEY
        sync: false
