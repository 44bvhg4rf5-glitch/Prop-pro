services:
  - type: web
    name: propmail-pro
    runtime: node
    plan: free
    branch: claude/application-website-6b87jv
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      # Optional — only needed for the AI features (chat, owner research, AI
      # letter writing). The live Rightmove search works WITHOUT this.
      - key: ANTHROPIC_API_KEY
        sync: false
      # Optional — free GOV.UK EPC register token, powers the "Find full
      # address" (house-number) lookup. Register at
      # https://get-energy-performance-data.communities.gov.uk
      - key: EPC_API_KEY
        sync: false
      # Optional — free Ordnance Survey Places API key. Powers the Success
      # Letters address finder with the COMPLETE Royal Mail PAF address list
      # for a postcode. Without it, the finder falls back to the EPC register
      # (homes with an Energy Certificate only). Register at
      # https://osdatahub.os.uk (free OS Places API plan).
      - key: OS_PLACES_KEY
        sync: false
      # Do-Not-Mail / suppression list storage (durable, cross-device). On
      # Vercel: Storage → Create Database → KV auto-adds these. Elsewhere, create
      # a free Upstash Redis DB and copy its REST URL + token here. Without them
      # the block list falls back to per-device browser storage.
      - key: KV_REST_API_URL
        sync: false
      - key: KV_REST_API_TOKEN
        sync: false
